# 自动发布工作流：GitHub Actions + Semantic Release
# 基于约定式提交（Conventional Commits）自动管理版本号、生成 CHANGELOG、构建并发布 APK
# 触发条件：push 到 main 分支
# 提交格式：
#   feat: 新功能 → 次版本号 (1.0.0 → 1.1.0)
#   fix:  修复   → 补丁版本号 (1.0.0 → 1.0.1)
#   feat!/fix!: 不兼容变更 → 主版本号 (1.0.0 → 2.0.0)
#   chore/docs: 不触发发布
name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # fetch-depth: 0 获取完整提交历史，semantic-release 需要分析所有 commit
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install semantic-release
        run: |
          npm install -g \
            semantic-release \
            @semantic-release/git \
            @semantic-release/changelog \
            @semantic-release/exec

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
