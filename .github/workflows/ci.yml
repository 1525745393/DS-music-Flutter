name: DS Player CI

on:
  push:
    branches: [main, develop, 'release/**']
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Analyze + Unit Test
    runs-on: ubuntu-latest
    # 关键：Auto-fix formatting 步骤需要 push 权限
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true
      - name: Install dependencies
        # 关键：--verbose 输出完整 pub 解析日志，CI 失败时能从日志看到
        # 到底是哪个包 / 哪个版本不满足约束
        run: flutter pub get --verbose 2>&1 | tee pub_get.log
      - name: Upload pub get log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pub-get-log
          path: pub_get.log
      - name: Auto-fix formatting
        # 关键：先逐文件尝试 dart format，定位有语法错误的文件，
        # 避免整个 step 因单个文件出错直接 exit 65 中断
        # 捕获到错误的文件后单独跳过
        run: |
          git config user.name "ds-player-bot"
          git config user.email "bot@dsplayer.local"
          echo "=== 检查 dart 语法错误 ==="
          # 用 dart analyze 快速找出语法错的文件
          BAD_FILES=$(dart analyze lib test 2>&1 | grep -E "error -" | grep -oE "lib/[^ ]+\.dart|test/[^ ]+\.dart" | sort -u)
          echo "语法错误文件: $BAD_FILES"
          if [ -n "$BAD_FILES" ]; then
            echo "::error::以下文件存在语法错误，需要修复：$BAD_FILES"
            dart analyze lib test 2>&1 | head -50
            exit 1
          fi
          echo "=== 全部文件语法 OK，开始 dart format ==="
          dart format lib test
          if ! git diff --quiet; then
            git add -A
            git commit -m "style: dart format 自动修复" || true
            git push || true
          fi
      - name: Verify formatting
        run: dart format --set-exit-if-changed lib test
      - name: Static analysis
        run: flutter analyze
      - name: Run tests
        run: flutter test --coverage
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/lcov.info

  build-android:
    name: Build Android (APK)
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Build APK (release)
        run: |
          flutter build apk --release \
            --dart-define=DS_CHANNEL=stable \
            --build-name=${GITHUB_REF#refs/heads/release/} \
            --build-number=${GITHUB_RUN_NUMBER}
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ds-player-release
          path: build/app/outputs/flutter-apk/app-release.apk

  # 灰度发布：自动为每个 release tag 创建 GitHub Release
  release:
    name: Create Release
    needs: build-android
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/heads/release/')
    permissions:
      contents: write
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: ds-player-release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: app-release.apk
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
