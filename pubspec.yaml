name: ds_music_flutter
description: DS Player - Synology AudioStation Flutter Client，复刻iOS端DS Player体验。
publish_to: 'none'
version: 1.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Cupertino 图标
  cupertino_icons: ^1.0.8

  # 网络层
  dio: ^5.4.3+1
  pretty_dio_logger: ^1.4.0
  http: ^1.2.1

  # 播放核心
  just_audio: ^0.9.36
  just_audio_background: ^0.0.1-beta.11
  just_audio_media_kit: ^0.0.2
  audio_service: ^0.18.12
  audio_session: ^0.1.18
  audio_handler: ^0.1.0

  # 状态管理
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # 本地存储与文件
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  path: ^1.9.0

  # 图片缓存
  cached_network_image: ^3.3.1
  flutter_cache_manager: ^3.3.1

  # 设备能力与权限
  connectivity_plus: ^5.0.2
  permission_handler: ^11.3.1
  system_overlay_window: ^2.0.0
  device_info_plus: ^10.1.0
  package_info_plus: ^8.0.0

  # DLNA/UPnP 投屏
  upnp2: ^1.0.0
  multicast: ^0.3.0+1
  network_info_plus: ^5.0.3
  socket_io_client: ^2.0.3+1

  # 均衡器
  flutter_equalizer: ^0.1.2

  # UI 辅助
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  animations: ^2.0.10
  flutter_staggered_grid_view: ^0.7.0

  # 工具
  intl: ^0.19.0
  collection: ^1.18.0
  crypto: ^3.0.3
  uuid: ^4.4.0
  rxdart: ^0.27.7
  url_launcher: ^6.3.0
  get_it: ^7.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: SF Pro
      fonts:
        - asset: assets/fonts/SFPro-Regular.ttf
        - asset: assets/fonts/SFPro-Medium.ttf
          weight: 500
        - asset: assets/fonts/SFPro-Semibold.ttf
          weight: 600
        - asset: assets/fonts/SFPro-Bold.ttf
          weight: 700
