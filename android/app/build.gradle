// App 模块 build.gradle
// 关键：minSdk 21（覆盖 99% Android 设备），
// compileSdk 34（Android 14），targetSdk 34
plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode")
if (flutterVersionCode == null) {
    flutterVersionCode = "1"
}

def flutterVersionName = localProperties.getProperty("flutter.versionName")
if (flutterVersionName == null) {
    flutterVersionName = "1.0"
}

android {
    namespace "com.dsplayer.music"
    compileSdk 34
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    sourceSets {
        main.java.srcDirs += "src/main/kotlin"
    }

    defaultConfig {
        applicationId "com.dsplayer.music"
        // 最低支持 Android 5.0（API 21）
        minSdk 21
        targetSdk 34
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName

        // 兼容多 ABI：armeabi-v7a / arm64-v8a / x86_64
        ndk {
            abiFilters "armeabi-v7a", "arm64-v8a", "x86_64"
        }
    }

    signingConfigs {
        release {
            // 发布签名配置：
            // - 若当前目录存在 release.keystore，使用它（生产环境）
            // - 否则使用同目录下的 debug.keystore（CI/测试环境，仓库附带）
            // - 都没有则抛出错误，避免构建出未签名 APK
            def releaseStoreFile = file("release.keystore")
            def debugStoreFile = file("debug.keystore")
            if (releaseStoreFile.exists()) {
                // CI 环境：优先从环境变量读取签名密码（GitHub Secrets）
                // 本地开发：从 local.properties 读取
                def releaseStorePassword = System.getenv("STORE_PASSWORD") ?: localProperties.getProperty("release.storePassword", "")
                def releaseKeyAlias = System.getenv("KEY_ALIAS") ?: localProperties.getProperty("release.keyAlias", "dsplayer")
                def releaseKeyPassword = System.getenv("KEY_PASSWORD") ?: localProperties.getProperty("release.keyPassword", "")
                storeFile releaseStoreFile
                storePassword releaseStorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            } else if (debugStoreFile.exists()) {
                // 使用 debug.keystore（CI 环境，保证 APK 可安装）
                storeFile debugStoreFile
                storePassword "android"
                keyAlias "androiddebugkey"
                keyPassword "android"
            } else {
                throw new GradleException(
                    "未找到签名文件：release.keystore 或 debug.keystore。" +
                    "请生成 debug.keystore 放到 android/app/ 目录，" +
                    "或在 local.properties 中配置 release 签名。"
                )
            }
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
        debug {
            applicationIdSuffix ".debug"
        }
    }

    // 关闭 buildConfig 生成（节省构建时间）
    buildFeatures {
        buildConfig false
    }

    packagingOptions {
        resources {
            excludes += [
                "META-INF/AL2.0",
                "META-INF/LGPL2.1",
                "META-INF/DEPENDENCIES",
                "META-INF/LICENSE*",
                "META-INF/NOTICE*"
            ]
        }
    }
}

flutter {
    source "../.."
}

dependencies {
    // just_audio_background 依赖 androidx.media
    implementation "androidx.media:media:1.7.0"
    // 通知兼容性
    implementation "androidx.core:core-ktx:1.13.1"
    implementation "androidx.appcompat:appcompat:1.6.1"
}
